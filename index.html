<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMB — Candle Copy Trader</title>
  <style>
    :root {
      --bg:       #0d0f14;
      --surface:  #161a23;
      --border:   #252b38;
      --accent:   #00d4aa;
      --accent2:  #7b61ff;
      --yes:      #22c55e;
      --no:       #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --warn:     #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .pulse {
      display: inline-block; width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
      animation: pulse 1.6s infinite;
      margin-right: 6px;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(1.4); }
    }
    .meta { font-size: .8rem; color: var(--muted); }

    /* ── Stat bar ── */
    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      min-width: 130px;
    }
    .stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-top: 2px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 28px 0;
    }
    .tab {
      padding: 8px 18px;
      border-radius: 8px 8px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: .85rem;
      font-weight: 500;
      transition: all .15s;
    }
    .tab.active { background: var(--bg); color: var(--accent); border-color: var(--accent); }

    /* ── Main grid ── */
    main { padding: 0 28px 40px; }
    .panel { display: none; padding-top: 20px; }
    .panel.active { display: block; }

    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      cursor: pointer; font-size: .78rem; font-weight: 600;
      transition: all .15s;
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,.08); }

    /* ── Signal cards ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-title { font-size: .82rem; color: var(--muted); margin-bottom: 6px; line-height: 1.4; }
    .card-asset {
      font-size: .72rem; font-weight: 700;
      padding: 3px 8px; border-radius: 6px;
      background: rgba(123,97,255,.15); color: var(--accent2);
      white-space: nowrap;
    }
    .card-outcome {
      display: inline-block;
      font-size: 1rem; font-weight: 700;
      padding: 4px 12px; border-radius: 8px;
      margin-top: 4px;
    }
    .card-outcome.YES { background: rgba(34,197,94,.12); color: var(--yes); }
    .card-outcome.NO  { background: rgba(239,68,68,.12);  color: var(--no); }
    .card-meta {
      display: flex; gap: 14px; margin-top: 12px;
      font-size: .78rem; color: var(--muted);
    }
    .card-meta span b { color: var(--text); }
    .card-body { margin-top: 12px; display: none; border-top: 1px solid var(--border); padding-top: 12px; }
    .card.open .card-body { display: block; }
    .trader-row {
      display: flex; justify-content: space-between;
      font-size: .76rem; color: var(--muted);
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .trader-row:last-child { border-bottom: none; }
    .wr-pill {
      font-size: .7rem; font-weight: 600;
      padding: 2px 7px; border-radius: 5px;
      background: rgba(0,212,170,.1); color: var(--accent);
    }
    .hot { border-color: var(--warn) !important; }
    .hot .card-asset { background: rgba(245,158,11,.12); color: var(--warn); }

    /* ── Traders table ── */
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th {
      text-align: left; padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted); font-weight: 600; font-size: .72rem;
      text-transform: uppercase; letter-spacing: .4px;
    }
    td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.04); }
    tr:hover td { background: rgba(255,255,255,.02); }
    .rank { color: var(--accent); font-weight: 700; }
    .wr-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .wr-bar-bg { width: 80px; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .wr-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }

    /* ── Markets list ── */
    .mkt-list { display: flex; flex-direction: column; gap: 8px; }
    .mkt-row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      font-size: .82rem;
    }
    .mkt-badge {
      padding: 3px 10px; border-radius: 6px;
      font-size: .72rem; font-weight: 700;
    }
    .mkt-badge.btc { background: rgba(247,147,26,.12); color: #f7931a; }
    .mkt-badge.eth { background: rgba(98,126,234,.12);  color: #627eea; }

    /* ── Empty state ── */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: .9rem;
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">PMB <span>/ Candle Copy Trader</span></div>
  <div class="meta">
    <span class="pulse"></span>
    <span id="last-update">connecting…</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-label">Markets</div><div class="stat-value" id="s-markets">—</div></div>
  <div class="stat"><div class="stat-label">Traders</div><div class="stat-value" id="s-traders">—</div></div>
  <div class="stat"><div class="stat-label">Signals</div><div class="stat-value" id="s-signals">—</div></div>
  <div class="stat"><div class="stat-label">Spent Today</div><div class="stat-value" id="s-spent">—</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('signals', this)">🚨 Signals</div>
  <div class="tab" onclick="switchTab('traders', this)">👑 Traders</div>
  <div class="tab" onclick="switchTab('markets', this)">🕯️ Markets</div>
</div>

<main>
  <!-- SIGNALS panel -->
  <div id="panel-signals" class="panel active">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('btc',this)">BTC</button>
      <button class="filter-btn" onclick="setFilter('eth',this)">ETH</button>
      <button class="filter-btn" onclick="setFilter('yes',this)">YES only</button>
      <button class="filter-btn" onclick="setFilter('no',this)">NO only</button>
      <button class="filter-btn" onclick="setFilter('hot',this)">🔥 Hot (3+)</button>
    </div>
    <div class="cards" id="signal-cards">
      <div class="loading">Loading signals…</div>
    </div>
  </div>

  <!-- TRADERS panel -->
  <div id="panel-traders" class="panel">
    <table id="traders-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Wallet</th>
          <th>Win Rate</th>
          <th>W / L</th>
          <th>Volume USD</th>
          <th>Last Seen</th>
        </tr>
      </thead>
      <tbody id="traders-body">
        <tr><td colspan="6" class="loading">Loading traders…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- MARKETS panel -->
  <div id="panel-markets" class="panel">
    <div class="mkt-list" id="mkt-list">
      <div class="loading">Loading markets…</div>
    </div>
  </div>
</main>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const API = "https://YOUR_RAILWAY_APP.up.railway.app";  // ← replace this
  const REFRESH_MS = 30_000;

  let activeTab    = "signals";
  let activeFilter = "all";
  let signals = [], traders = [], markets = [];

  // ── Tab switching ───────────────────────────────────────────────────────────
  function switchTab(name, el) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    el.classList.add("active");
    document.getElementById(`panel-${name}`).classList.add("active");
    activeTab = name;
  }

  // ── Filter ──────────────────────────────────────────────────────────────────
  function setFilter(f, el) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
    activeFilter = f;
    renderSignals();
  }

  function applyFilter(sigs) {
    return sigs.filter(s => {
      if (activeFilter === "btc")  return s.asset === "BTC";
      if (activeFilter === "eth")  return s.asset === "ETH";
      if (activeFilter === "yes")  return s.outcome === "YES";
      if (activeFilter === "no")   return s.outcome === "NO";
      if (activeFilter === "hot")  return s.holder_count >= 3;
      return true;
    });
  }

  // ── Fetch ───────────────────────────────────────────────────────────────────
  async function fetchAll() {
    try {
      const [sRes, tRes, mRes, stRes] = await Promise.all([
        fetch(`${API}/signals`),
        fetch(`${API}/traders`),
        fetch(`${API}/markets`),
        fetch(`${API}/stats`),
      ]);
      signals = await sRes.json();
      traders = await tRes.json();
      markets = await mRes.json();
      const stats = await stRes.json();

      document.getElementById("s-markets").textContent = stats.markets_tracked ?? "—";
      document.getElementById("s-traders").textContent = stats.top_trader_count ?? "—";
      document.getElementById("s-signals").textContent = stats.signals_today ?? "—";
      document.getElementById("s-spent").textContent   = `$${(stats.spent_today ?? 0).toFixed(2)}`;
      document.getElementById("last-update").textContent = "updated " + new Date().toLocaleTimeString();

      renderSignals();
      renderTraders();
      renderMarkets();
    } catch(e) {
      document.getElementById("last-update").textContent = "⚠️ offline";
      console.error(e);
    }
  }

  // ── Render signals ──────────────────────────────────────────────────────────
  function renderSignals() {
    const el   = document.getElementById("signal-cards");
    const data = applyFilter(signals);
    if (!data.length) {
      el.innerHTML = `<div class="empty"><div class="icon">🔍</div>No signals match this filter.</div>`;
      return;
    }
    el.innerHTML = data.map(s => {
      const hot = s.holder_count >= 3 ? " hot" : "";
      const holders = (s.holders || []).map(h => `
        <div class="trader-row">
          <span>${h.wallet.slice(0,8)}…${h.wallet.slice(-4)}</span>
          <span class="wr-pill">${h.win_rate != null ? (h.win_rate*100).toFixed(0)+"%" : "?"}</span>
          <span>$${h.size_usd?.toFixed(0) ?? "?"} @ ${h.price?.toFixed(2) ?? "?"}</span>
        </div>
      `).join("");
      return `
        <div class="card${hot}" onclick="this.classList.toggle('open')">
          <div class="card-header">
            <div>
              <div class="card-title">${s.title || s.conditionId}</div>
              <span class="card-outcome ${s.outcome}">${s.outcome}</span>
            </div>
            <span class="card-asset">${s.asset} ${s.window_min}min</span>
          </div>
          <div class="card-meta">
            <span>👥 <b>${s.holder_count}</b> traders</span>
            <span>💰 avg <b>${s.avg_price?.toFixed(2) ?? "?"}</b></span>
          </div>
          <div class="card-body">${holders}</div>
        </div>
      `;
    }).join("");
  }

  // ── Render traders ──────────────────────────────────────────────────────────
  function renderTraders() {
    const tbody = document.getElementById("traders-body");
    if (!traders.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">No traders scored yet. Needs resolved markets.</td></tr>`;
      return;
    }
    tbody.innerHTML = traders.map((t, i) => {
      const wr  = t.win_rate != null ? (t.win_rate * 100).toFixed(1) : "?";
      const pct = t.win_rate != null ? Math.round(t.win_rate * 100) : 0;
      const ago = t.last_seen ? timeSince(new Date(t.last_seen)) : "—";
      return `
        <tr>
          <td class="rank">${i + 1}</td>
          <td title="${t.wallet}">${t.wallet.slice(0,8)}…${t.wallet.slice(-4)}</td>
          <td>
            <div class="wr-bar-wrap">
              <div class="wr-bar-bg"><div class="wr-bar-fill" style="width:${pct}%"></div></div>
              <span>${wr}%</span>
            </div>
          </td>
          <td>${t.wins}W / ${t.losses}L</td>
          <td>$${(t.volume_usd || 0).toFixed(0)}</td>
          <td>${ago}</td>
        </tr>
      `;
    }).join("");
  }

  // ── Render markets ──────────────────────────────────────────────────────────
  function renderMarkets() {
    const el = document.getElementById("mkt-list");
    if (!markets.length) {
      el.innerHTML = `<div class="empty"><div class="icon">🕯️</div>No active candle markets detected.</div>`;
      return;
    }
    el.innerHTML = markets.map(m => `
      <div class="mkt-row">
        <span>${m.title || m.conditionId}</span>
        <span class="mkt-badge ${(m.asset||"").toLowerCase()}">${m.asset} ${m.window_min}min</span>
      </div>
    `).join("");
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function timeSince(date) {
    const secs = Math.floor((Date.now() - date) / 1000);
    if (secs < 60)   return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
    return `${Math.floor(secs/3600)}h ago`;
  }

  // ── Boot ────────────────────────────────────────────────────────────────────
  fetchAll();
  setInterval(fetchAll, REFRESH_MS);
</script>
</body>
</html>
